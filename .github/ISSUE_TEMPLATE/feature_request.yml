name: Feature Request
description: Suggest a new feature or enhancement for Stem
title: "[FEATURE] "
labels: ["type: feature", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out this form to help us understand your idea.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the feature you'd like.
      placeholder: Describe the feature in a sentence or two...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is this related to a frustration?
      placeholder: |
        I'm always frustrated when...
        Currently there's no way to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you envision this feature working.
      placeholder: |
        I would like to...
        The feature should...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Stem would this affect?
      options:
        - API/Backend
        - UI/Frontend
        - Reflector
        - Benchmark (RFC 2544)
        - ServiceTest (Y.1564/MEF)
        - TrafficGen
        - Measure (Y.1731)
        - Certify (RFC 2889/6349/TSN)
        - TestMaster
        - License
        - C Dataplane (DPDK/AF_PACKET/AF_XDP)
        - CLI
        - Installation/Deployment
        - Documentation
        - CI/CD Pipeline
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Would improve my workflow
        - Important for my use case
        - Critical - blocking my use of Stem
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered?
      placeholder: |
        I considered using...
        An alternative approach would be...

  - type: textarea
    id: use-cases
    attributes:
      label: Use Cases
      description: Describe specific scenarios where this feature would be useful.
      placeholder: |
        - Use case 1: When I'm doing X, I need to...
        - Use case 2: For Y workflow, this would help by...
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Notes
      description: If you have technical suggestions for implementation, add them here.
      placeholder: |
        This could be implemented by...
        Consider using...

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or screenshots about the feature request.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this isn't a duplicate
          required: true
        - label: I have described the problem this feature would solve
          required: true
