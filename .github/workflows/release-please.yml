# =============================================================================
# Release Please - Automated Version Management
# =============================================================================
# Creates release PRs with changelogs when commits land on main.
# When a release PR is merged, creates a GitHub release which triggers
# release.yml for building packages (via version tag).
#
# Trigger mirrors seed and niac's canonical pattern: fires on every CI
# workflow completion, only acts when CI succeeded (otherwise the
# version would bump on broken code). workflow_dispatch is kept for
# manual triggers / debugging.
# =============================================================================

name: Release Please

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Only run if CI workflow succeeded (or this is a manual dispatch).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # PAT (not GITHUB_TOKEN) so the release PR's CI runs and the
          # tag-push event triggers release.yml. With GITHUB_TOKEN those
          # downstream workflows are silently skipped.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          release-type: go
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: Output release info
        if: steps.release.outputs.release_created
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          echo "Release created: ${TAG_NAME}"
          echo "Version: ${VERSION}"

  trigger-release:
    name: Trigger Release Build
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release workflow
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          echo "Release ${TAG_NAME} created"
          echo "The release.yml workflow will be triggered by the new tag"
