# =============================================================================
# Release (goreleaser)
# =============================================================================
# Canonical release pipeline. Replaces the prior hand-coded matrix workflow
# (release-linux / release-macos / release-windows / publish) plus the
# standalone .nfpm.yaml. Drives .goreleaser.yml inside the goreleaser-cross
# container.
#
# Triggers:
#   - push to a v* tag: real release - builds, signs, publishes
#   - workflow_dispatch with dry_run=true: snapshot only - no publish, no
#     signing; artifacts uploaded for inspection
#   - workflow_dispatch with provenance_only=true (ref=<existing tag>):
#     skips goreleaser entirely, recomputes artifact subjects from the
#     already-published checksums.txt on that tag's GitHub release, then
#     runs attest-build-provenance + uploads the .intoto.jsonl. Used to
#     retroactively attest tags that shipped before the provenance job
#     existed. provenance_only takes precedence over dry_run.
#
# Mirrors seed and niac's release.yml shape so all three projects converge
# on the same release tooling.
#
# Toolchain notes:
#   stem builds with CGO_ENABLED=0 across all targets (pure-Go networking,
#   no libpcap), so the per-target compiler overrides used by seed and
#   niac inside goreleaser-cross aren't needed. The container is still
#   used for the bundled goreleaser + ancillary tooling parity.
#
# Inputs: only the typed `dry_run` boolean - no untrusted event fields
# are interpolated into shell commands.
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Snapshot build only - do not publish or sign"
        type: boolean
        default: true
      provenance_only:
        description: "Backfill: skip build, recompute subjects from the existing release's checksums.txt, attest + upload bundle"
        type: boolean
        default: false
      target_tag:
        description: "Backfill target tag (e.g. v0.12.0). Required when provenance_only=true — workflow_dispatch must be issued against main since older tags don't have these inputs."
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write # cosign keyless OIDC
  packages: write

jobs:
  # =========================================================================
  # UI build - done outside the goreleaser-cross container because that
  # image is Go-focused and doesn't ship Node. Vite writes directly to
  # internal/api/ui/; the next job inherits the workspace.
  # =========================================================================
  build-ui:
    name: Build UI
    if: ${{ !inputs.provenance_only }}
    runs-on: ubuntu-latest
    outputs:
      ui_hash: ${{ steps.ui-hash.outputs.hash }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26.2.0"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: |
          cd ui
          npm ci
          npm run build

      - name: Compute UI build hash
        id: ui-hash
        run: |
          UI_BUILD_HASH=$(find internal/api/ui -type f -exec md5sum {} \; | sort | md5sum | cut -d' ' -f1)
          echo "hash=$UI_BUILD_HASH" >> "$GITHUB_OUTPUT"

      - name: Upload UI dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-dist
          path: internal/api/ui/
          retention-days: 1
          include-hidden-files: true

  # =========================================================================
  # goreleaser build + (when not dry-run) publish.
  # =========================================================================
  goreleaser:
    name: goreleaser
    if: ${{ !inputs.provenance_only }}
    runs-on: ubuntu-latest
    needs: [build-ui]
    container:
      # Docker Hub tag scheme: <go-version>-<bundle-revision>. v1.26.2-3
      # tracks Go 1.26.2 + goreleaser v2.15.4. Pinned for reproducibility;
      # bump via dependabot when newer revs land.
      image: goreleaser/goreleaser-cross:v1.26.2-3
    outputs:
      # base64-encoded SHA-256 hashes of all release artifacts, formatted
      # for slsa-github-generator's base64-subjects input. Set only on a
      # real (non-snapshot) release.
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Mark workspace as safe (container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download UI dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ui-dist
          path: internal/api/ui/

      - name: Install Syft (SBOM) inside container
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Install Cosign inside container
        run: |
          COSIGN_VERSION=v2.4.1
          curl -sSfL -o /usr/local/bin/cosign "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          chmod +x /usr/local/bin/cosign

      - name: Run goreleaser (snapshot/dry-run)
        if: inputs.dry_run
        env:
          UI_BUILD_HASH: ${{ needs.build-ui.outputs.ui_hash }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --snapshot --clean --skip=publish,announce

      - name: Run goreleaser (publish)
        if: ${{ !inputs.dry_run }}
        env:
          UI_BUILD_HASH: ${{ needs.build-ui.outputs.ui_hash }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # --skip=validate: the UI build downloaded into internal/api/ui/
        # overwrites tracked stubs (index.html with the prior bundle's
        # hashed asset refs), which goreleaser would otherwise flag as
        # "git is in a dirty state". PR-level CI validates the same
        # content via the dry-run snapshot.
        run: goreleaser release --clean --skip=validate

      - name: Capture artifact hashes for SLSA provenance
        if: ${{ !inputs.dry_run }}
        id: hashes
        shell: bash
        run: |
          # goreleaser drops artifacts.json describing every produced
          # artifact. Filter to the user-facing ones (archive/package
          # types) and base64-encode their SHA-256 list for the
          # slsa-github-generator reusable workflow.
          set -euo pipefail
          hashes=$(jq -r '
            map(select(.type == "Archive" or .type == "Linux Package")) |
            map("\(.extra.Checksum | sub("^sha256:"; ""))  \(.name)") |
            join("\n")
          ' dist/artifacts.json | base64 -w0)
          echo "hashes=${hashes}" >> "$GITHUB_OUTPUT"

      - name: Upload dry-run artifact bundle for inspection
        if: inputs.dry_run
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: goreleaser-dryrun-${{ github.run_id }}
          path: dist/
          retention-days: 14

  # =========================================================================
  # SLSA provenance backfill — recomputes the subject list from a tag's
  # already-published checksums.txt instead of running goreleaser. Used
  # to retroactively attest tags that shipped before the provenance job
  # existed (issue #75). Only fires under workflow_dispatch with
  # provenance_only=true; on a push or normal dispatch this job is
  # skipped and the regular `goreleaser` job feeds the provenance job.
  # =========================================================================
  goreleaser-backfill-hashes:
    name: goreleaser (backfill subjects from existing release)
    if: ${{ inputs.provenance_only }}
    runs-on: ubuntu-latest
    outputs:
      # Same base64-subjects contract as the goreleaser job's `hashes`
      # output. Provenance job picks whichever upstream produced one.
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - name: Download checksums.txt from existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_TAG: ${{ inputs.target_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$TARGET_TAG" ]; then
            echo "::error::provenance_only=true requires target_tag to identify which existing release to attest"
            exit 1
          fi
          gh release download "$TARGET_TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'checksums.txt' \
            --dir .
          echo "checksums.txt contents:"
          cat checksums.txt

      - name: Convert checksums.txt to base64 subjects
        id: hashes
        shell: bash
        run: |
          # checksums.txt is the standard goreleaser format:
          #   <sha256>  <filename>
          # The attest-build-provenance `subject-checksums` input takes
          # exactly that format. We base64-encode here so the output
          # contract matches the goreleaser job's `hashes` output.
          set -euo pipefail
          hashes=$(base64 -w0 < checksums.txt)
          echo "hashes=${hashes}" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # SLSA L3 provenance — runs on real releases (not dry-run).
  #
  # Uses GitHub's first-party `actions/attest-build-provenance` rather than
  # the slsa-github-generator reusable workflow. The latter (v2.1.0, the
  # current latest as of 2026-05) has a known bug in its upload-assets
  # step where UNTRUSTED_PATH is passed empty, causing the secure-download
  # action to exit 1 and the `final` job to exit 27. attest-build-provenance
  # produces the same SLSA L3 in-toto attestation (signed via Sigstore
  # keyless OIDC), surfaces it on the release's GitHub Attestations panel,
  # AND attaches the bundle file to the release as a downloadable asset.
  # Mirrors seed and niac's provenance job.
  #
  # Two upstream paths feed this job (only one runs per invocation):
  #   - normal release:  needs.goreleaser produces subjects from artifacts.json
  #   - provenance_only: needs.goreleaser-backfill-hashes produces subjects
  #                      from the existing release's checksums.txt
  # =========================================================================
  provenance:
    name: SLSA provenance
    # Skip on dry-run snapshots; require one of the two upstreams to have
    # succeeded. `!cancelled()` lets this job run even though one of the
    # two `needs` is intentionally skipped per dispatch path.
    if: ${{ !inputs.dry_run && !cancelled() && (needs.goreleaser.result == 'success' || needs.goreleaser-backfill-hashes.result == 'success') }}
    needs: [goreleaser, goreleaser-backfill-hashes]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # Sigstore OIDC signing
      contents: write       # uploading the bundle to the release
      attestations: write   # GitHub Attestations API
    steps:
      - name: Decode artifact subjects
        id: subjects
        shell: bash
        run: |
          set -euo pipefail
          # Pick whichever upstream ran. The unused one is empty.
          echo "${{ needs.goreleaser.outputs.hashes || needs.goreleaser-backfill-hashes.outputs.hashes }}" \
            | base64 -d > subjects.txt
          echo "Subjects:"
          cat subjects.txt

      - name: Generate SLSA build-provenance attestation
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: subjects.txt

      - name: Attach attestation bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_TAG: ${{ inputs.target_tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ steps.attest.outputs.bundle-path }}" \
             stem-slsa-provenance.intoto.jsonl
          gh release upload "$TARGET_TAG" \
             stem-slsa-provenance.intoto.jsonl --clobber --repo "${GITHUB_REPOSITORY}"
