# Release Please Workflow
# Mustard Seed Networks - The Stem
#
# Automatically creates release PRs based on conventional commits
# Triggers release.yml when a release is created

name: Release Please

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          release-type: go
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: Output release info
        if: steps.release.outputs.release_created
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          echo "Release created: ${TAG_NAME}"
          echo "Version: ${VERSION}"

  trigger-release:
    name: Trigger Release Build
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release workflow
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          echo "Release ${TAG_NAME} created"
          echo "The release.yml workflow will be triggered by the new tag"
