name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
      - .github/workflows/label-sync.yml
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  metadata: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          yaml-file: .github/labels.yml
          skip-delete: true
