name: Bug Report
description: Report a bug to help us improve Stem
title: "[BUG] "
labels: ["type: defect", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out all required fields.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Stem is affected?
      options:
        - API/Backend
        - UI/Frontend
        - Reflector
        - Benchmark (RFC 2544)
        - ServiceTest (Y.1564/MEF)
        - TrafficGen
        - Measure (Y.1731)
        - Certify (RFC 2889/6349/TSN)
        - TestMaster
        - License
        - C Dataplane (DPDK/AF_PACKET/AF_XDP)
        - CLI
        - Installation/Deployment
        - Documentation
        - CI/CD Pipeline
        - Other
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical - App crashes or data loss
        - High - Major feature broken
        - Medium - Feature partially broken
        - Low - Minor issue or cosmetic
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Stem Version
      description: "Run: ./stem --version or check the UI footer"
      placeholder: "e.g., v1.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Which OS are you running on?
      placeholder: "e.g., Ubuntu 24.04, macOS 15.1, Raspberry Pi OS"
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      description: What CPU architecture?
      options:
        - amd64 (x86_64)
        - arm64 (aarch64)
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (if UI issue)
      description: Which browser are you using?
      placeholder: "e.g., Chrome 120, Firefox 121, Safari 17"

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs here (check journalctl -u stem or stem.log)
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this isn't a duplicate
          required: true
        - label: I have included version and environment information
          required: true
