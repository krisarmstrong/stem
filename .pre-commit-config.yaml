# =============================================================================
# Pre-commit Hooks Configuration - The Stem
# =============================================================================
#
# Run before every commit to catch issues early.
# Install: pip install pre-commit && pre-commit install
#
# Manual run: pre-commit run --all-files
# Skip hooks: git commit --no-verify (NOT RECOMMENDED)
#
# =============================================================================

repos:
  # ===========================================================================
  # General Checks
  # ===========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^ui/dist/
      - id: end-of-file-fixer
        exclude: ^ui/dist/
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict

  # ===========================================================================
  # Secret Scanning
  # ===========================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # ===========================================================================
  # Go Checks
  # ===========================================================================
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet
      - id: go-mod-tidy

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go-test
        entry: bash -c 'go test -race -short ./...'
        language: system
        types: [go]
        pass_filenames: false

      - id: gosec-check
        name: gosec security scan
        entry: bash -c 'command -v gosec > /dev/null && gosec -quiet ./... || echo "gosec not installed, skipping"'
        language: system
        types: [go]
        pass_filenames: false

  # ===========================================================================
  # C/C++ Checks
  # ===========================================================================
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.8
    hooks:
      - id: clang-format
        types_or: [c, c++]

  - repo: local
    hooks:
      - id: clang-tidy
        name: clang-tidy
        entry: bash -c 'command -v clang-tidy > /dev/null && clang-tidy --quiet "$@" || echo "clang-tidy not installed, skipping"'
        language: system
        types_or: [c, c++]
        pass_filenames: true

  # ===========================================================================
  # Frontend Checks (Biome)
  # ===========================================================================
  - repo: local
    hooks:
      - id: frontend-lint
        name: Biome lint
        entry: bash -c 'cd ui && npm run lint'
        language: system
        files: ^ui/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: frontend-typecheck
        name: TypeScript check
        entry: bash -c 'cd ui && npx tsc --noEmit'
        language: system
        files: ^ui/.*\.(ts|tsx)$
        pass_filenames: false

      - id: frontend-test
        name: Frontend unit tests
        entry: bash -c 'cd ui && npm run test'
        language: system
        files: ^ui/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

  # ===========================================================================
  # Shell Script Checks
  # ===========================================================================
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        # --severity=warning: catches real bugs; info-level style suggestions
        # (SC2086 word splitting in known-safe contexts, etc.) stay advisory
        # to avoid blocking commits on intentional patterns.
        args: [--severity=warning]
        files: \.(sh|bash)$

  # ===========================================================================
  # Markdown Checks
  # ===========================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: [--fix]
        exclude: ^node_modules/|^ui/node_modules/

  # ===========================================================================
  # Build Verification
  # ===========================================================================
  - repo: local
    hooks:
      - id: build-check
        name: Build verification
        entry: bash -c 'make build'
        language: system
        pass_filenames: false
        stages: [pre-push]

# Default stages for all hooks
default_stages: [pre-commit]

# Fail fast - stop on first failure
fail_fast: false

# Minimum pre-commit version
minimum_pre_commit_version: "3.0.0"
