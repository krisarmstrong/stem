# TODO/FIXME Tracker
# Scans codebase for technical debt markers and generates reports

name: TODO Tracker

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:

jobs:
  track:
    name: Track TODOs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Scan for TODOs and FIXMEs
        run: |
          echo "# TODO/FIXME Report" > todo-report.md
          echo "" >> todo-report.md
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> todo-report.md
          echo "" >> todo-report.md

          echo "## Summary" >> todo-report.md
          echo "" >> todo-report.md

          TODO_COUNT=$(grep -rn "TODO" --include="*.go" --include="*.ts" --include="*.tsx" --include="*.c" --include="*.h" . 2>/dev/null | grep -v node_modules | wc -l | tr -d ' ')
          FIXME_COUNT=$(grep -rn "FIXME" --include="*.go" --include="*.ts" --include="*.tsx" --include="*.c" --include="*.h" . 2>/dev/null | grep -v node_modules | wc -l | tr -d ' ')
          HACK_COUNT=$(grep -rn "HACK\|XXX" --include="*.go" --include="*.ts" --include="*.tsx" --include="*.c" --include="*.h" . 2>/dev/null | grep -v node_modules | wc -l | tr -d ' ')

          echo "- TODOs: $TODO_COUNT" >> todo-report.md
          echo "- FIXMEs: $FIXME_COUNT" >> todo-report.md
          echo "- HACKs/XXXs: $HACK_COUNT" >> todo-report.md
          echo "" >> todo-report.md

          echo "## Details" >> todo-report.md
          echo "" >> todo-report.md

          echo "### TODOs" >> todo-report.md
          echo '```' >> todo-report.md
          grep -rn "TODO" --include="*.go" --include="*.ts" --include="*.tsx" --include="*.c" --include="*.h" . 2>/dev/null | grep -v node_modules | head -50 >> todo-report.md || echo "None found" >> todo-report.md
          echo '```' >> todo-report.md
          echo "" >> todo-report.md

          echo "### FIXMEs" >> todo-report.md
          echo '```' >> todo-report.md
          grep -rn "FIXME" --include="*.go" --include="*.ts" --include="*.tsx" --include="*.c" --include="*.h" . 2>/dev/null | grep -v node_modules | head -50 >> todo-report.md || echo "None found" >> todo-report.md
          echo '```' >> todo-report.md

          cat todo-report.md

      - name: Upload report
        uses: actions/upload-artifact@v7.0.1
        with:
          name: todo-report
          path: todo-report.md
          retention-days: 30
