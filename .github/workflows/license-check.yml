name: License Compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check-licenses:
    name: License Compliance Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "25.2.1"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Go license checker
        run: go install github.com/google/go-licenses@latest

      - name: Check Go dependencies for license compliance
        run: |
          echo "Checking Go dependencies for license compliance..."
          echo ""

          # Check for forbidden/restricted licenses
          # Allowed: MIT, Apache-2.0, BSD-*, ISC, MPL-2.0
          # Forbidden: GPL, AGPL, SSPL (strong copyleft)
          # Restricted: LGPL, CC-BY-SA (requires review)

          go-licenses check ./... \
            --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,CC0-1.0 || {
            echo "FAILED: Incompatible licenses found in Go dependencies"
            echo ""
            echo "To see full license report, run: go-licenses report ./..."
            exit 1
          }

          echo "All Go dependencies use compatible licenses"

      - name: Generate Go license report
        run: |
          echo "Generating Go license report..."
          go-licenses report ./... > go-licenses.txt

          echo ""
          echo "=== License Summary ==="
          cat go-licenses.txt | awk -F',' '{print $2}' | sort | uniq -c | sort -rn
          echo ""

      - name: Install npm dependencies
        working-directory: ui
        run: npm ci

      - name: Check npm dependencies for license compliance
        working-directory: ui
        run: |
          echo "Checking npm dependencies for license compliance..."
          echo ""

          # Allowed licenses for npm packages
          # Note: Using --production flag to only check runtime dependencies
          npx license-checker --production \
            --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;0BSD;BlueOak-1.0.0;Python-2.0;Unlicense;WTFPL" \
            --summary || {
            echo "FAILED: Incompatible licenses found in npm dependencies"
            echo ""
            echo "To see full report, run: cd ui && npx license-checker --production"
            exit 1
          }

          echo "All npm production dependencies use compatible licenses"

      - name: Generate npm license report
        working-directory: ui
        run: |
          echo "Generating npm license report..."
          npx license-checker --production --csv > ../npm-licenses.csv

          echo ""
          echo "=== License Summary ==="
          npx license-checker --production --summary
          echo ""

      - name: Upload license reports
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: license-reports
          path: |
            go-licenses.txt
            npm-licenses.csv
          retention-days: 30

      - name: Comment on PR with license summary (if PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            let comment = '## License Compliance Report\n\n';
            comment += '### All dependencies pass license compliance checks\n\n';

            // Add Go license summary
            const goLicenses = fs.readFileSync('go-licenses.txt', 'utf8');
            const goLicenseTypes = {};
            goLicenses.split('\n').forEach(line => {
              const match = line.match(/,([^,]+)$/);
              if (match) {
                const license = match[1].trim();
                goLicenseTypes[license] = (goLicenseTypes[license] || 0) + 1;
              }
            });

            comment += '#### Go Dependencies\n';
            Object.entries(goLicenseTypes)
              .sort((a, b) => b[1] - a[1])
              .forEach(([license, count]) => {
                comment += `- ${license}: ${count} package(s)\n`;
              });

            comment += '\n#### npm Dependencies\n';
            comment += '_See full report in workflow artifacts_\n\n';
            comment += '**Allowed Licenses:** MIT, Apache-2.0, BSD-*, ISC, CC0-1.0, MPL-2.0\n';
            comment += '**Forbidden:** GPL, AGPL, SSPL (strong copyleft)\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Compliance check summary
        if: always()
        run: |
          echo ""
          echo "=============================================="
          echo "  LICENSE COMPLIANCE CHECK COMPLETE"
          echo "=============================================="
          echo ""
          echo "Allowed licenses:"
          echo "  MIT, Apache-2.0, BSD-*, ISC, CC0-1.0"
          echo "  MPL-2.0, BlueOak-1.0.0, Unlicense"
          echo ""
          echo "Forbidden licenses:"
          echo "  GPL, AGPL, SSPL (strong copyleft)"
          echo "  Proprietary, Commercial-use restricted"
          echo ""
          echo "Reports generated:"
          echo "  - go-licenses.txt"
          echo "  - npm-licenses.csv"
          echo ""
          echo "For healthcare/enterprise compliance:"
          echo "  - All runtime dependencies verified"
          echo "  - No GPL/AGPL contamination"
          echo "  - SBOM available in release artifacts"
          echo "=============================================="
