# The Stem CI Pipeline
# Mustard Seed Networks - Network Performance Testing
#
# Runs on: push to main, pull requests to main
# Jobs: backend, frontend, c-lint, security, quality, build

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  # ============================================================================
  # Path filter — classifies which areas changed so downstream jobs can skip
  # ============================================================================
  # Adds ~5s to every run; saves several minutes when a PR only touches one
  # area (docs-only / c-only / frontend-only). The CI Complete aggregator at
  # the bottom of this file enforces that all required jobs either passed or
  # were intentionally skipped, so branch protection can require just CI
  # Complete instead of every individual job.
  changes:
    name: Changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      c: ${{ steps.filter.outputs.c }}
      docker: ${{ steps.filter.outputs.docker }}
      docs: ${{ steps.filter.outputs.docs }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'mk/**'
            frontend:
              - 'ui/**'
            c:
              - 'src/**'
              - 'include/**'
              - 'tests/c/**'
              - '.clang-tidy'
              - '.clang-format'
            docker:
              - 'Dockerfile*'
              - '.dockerignore'
            docs:
              - '**/*.md'
            workflows:
              - '.github/workflows/**'

  # ============================================================================
  # Backend (Go)
  # ============================================================================
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.c == 'true' || needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build embedded UI assets
        run: |
          npm ci --prefix ui
          npm run build --prefix ui

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-18 \
            libbpf-dev \
            libelf-dev \
            libxdp-dev \
            make \
            zlib1g-dev

      - name: Build native dataplane library
        run: make CC=clang-18 dataplane

      - name: Compile native Go bindings
        run: CGO_ENABLED=1 go test -run '^$' ./internal/reflector/dataplane ./internal/services/orchestrator/dataplane

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.1

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m --new-from-rev=HEAD~1

      - name: Run tests
        run: CGO_ENABLED=0 go test -v -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Current coverage: ${COVERAGE}%"

          # Minimum coverage threshold. Acts as an anti-regression floor.
          # Overall coverage is ~58% (platform-specific code in Linux
          # dataplane and TUI pulls the average down; critical packages —
          # auth, database, logging, modules, config — are 90%+).
          #
          # Ratchet plan (raise after each release exceeds the next tier
          # by 5+ points):
          #   2026-Q2: 50 (current)
          #   2026-Q3: 55
          #   2026-Q4: 60
          #   2027-Q2: 65
          #   long-term: 70
          MIN_COVERAGE=50

          if (( $(echo "$COVERAGE < $MIN_COVERAGE" | bc -l) )); then
            echo "ERROR: Coverage ${COVERAGE}% is below minimum threshold of ${MIN_COVERAGE}%"
            exit 1
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          file: ./coverage.out
          flags: backend
          fail_ci_if_error: false

  # ============================================================================
  # Go Race Detector
  # ============================================================================
  # Dedicated race-only job to match seed's CI matrix (#56). Stem's main
  # backend tests run under CGO_ENABLED=0; the race detector requires cgo,
  # which means the dataplane cgo bindings need libxdp/libbpf/libelf at link
  # time. Install the same native deps as the Backend (Go) job and build
  # libreflector.a before invoking go test.
  race:
    name: Backend (race detector)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.c == 'true' || needs.changes.outputs.workflows == 'true'
    env:
      GOMODCACHE: ${{ github.workspace }}/.cache/go/pkg/mod
      GOCACHE: ${{ github.workspace }}/.cache/go/build

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build embedded UI assets
        run: |
          npm ci --prefix ui
          npm run build --prefix ui

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-18 \
            libbpf-dev \
            libelf-dev \
            libxdp-dev \
            make \
            zlib1g-dev

      - name: Build native dataplane library
        run: make CC=clang-18 dataplane

      - name: Run tests with race detector
        env:
          CGO_ENABLED: '1'
        run: go test -short -race ./...

  # ============================================================================
  # Frontend (TypeScript)
  # ============================================================================
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Biome lint
        run: npx @biomejs/biome check src/

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-dist
          path: internal/api/ui/
          retention-days: 1

  # ============================================================================
  # C Lint (C23 Standard - NOT C++)
  # ============================================================================
  c-lint:
    name: C Lint (C23)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.c == 'true' || needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install C23 tools (clang-tidy, cppcheck, bear)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-18 \
            clang-tidy-18 \
            clang-format-18 \
            cppcheck \
            bear \
            gcc-13
          
          # Set clang-18 as default
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-18 100
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100
          
          # Verify versions
          clang --version
          clang-tidy --version
          gcc-13 --version

      - name: Check if C files exist
        id: check-c
        run: |
          if [ -d "src" ] && find src include tests/c -name '*.c' -o -name '*.h' 2>/dev/null | grep -q .; then
            echo "has_c=true" >> $GITHUB_OUTPUT
            echo "Found C source files"
          else
            echo "has_c=false" >> $GITHUB_OUTPUT
            echo "No C source files found, skipping C lint"
          fi

      - name: Generate compile_commands.json
        if: steps.check-c.outputs.has_c == 'true'
        run: |
          # Create compile_commands.json for clang-tidy
          cat > compile_commands.json << 'EOF'
          [
            {
              "directory": "${{ github.workspace }}",
              "command": "gcc-13 -std=c23 -Wall -Wextra -Wpedantic -Iinclude -c src/dataplane/common/core.c",
              "file": "src/dataplane/common/core.c"
            }
          ]
          EOF
          
          # Use bear to generate proper compile_commands.json if Makefile exists
          if [ -f "Makefile" ]; then
            # Update CC to use gcc-13 for C23 support
            export CC=gcc-13
            # Generate compile database
            bear -- make dataplane || true
          fi

      - name: Run clang-format check (C23)
        if: steps.check-c.outputs.has_c == 'true'
        continue-on-error: true
        run: |
          echo "Checking C code formatting (C23 standard)..."
          find src include tests/c -name '*.c' -o -name '*.h' 2>/dev/null | \
            xargs clang-format --dry-run --Werror --style=file

      - name: Run clang-tidy (C23)
        if: steps.check-c.outputs.has_c == 'true'
        continue-on-error: true
        run: |
          echo "Running clang-tidy with C23 checks..."
          find src include tests/c -name '*.c' -o -name '*.h' 2>/dev/null | \
            xargs clang-tidy \
              --config-file=.clang-tidy \
              --extra-arg=-std=c23 \
              --extra-arg=-Iinclude \
              --warnings-as-errors='*'

      - name: Run cppcheck (C only, not C++)
        if: steps.check-c.outputs.has_c == 'true'
        continue-on-error: true
        run: |
          echo "Running cppcheck for C code..."
          cppcheck \
            --std=c23 \
            --language=c \
            --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --inline-suppr \
            --error-exitcode=1 \
            --template='{file}:{line}: {severity}: {message} [{id}]' \
            -I include \
            src/ 2>&1 | tee cppcheck.log
          
          if [ -s cppcheck.log ]; then
            echo "::warning::cppcheck found issues"
          fi

  # ============================================================================
  # Security Scanning
  # ============================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    # Always runs — security checks are non-negotiable on every PR.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        uses: securego/gosec@4a3bd8af174872c778439083ded7adbf3747e770 # v2.26.1
        continue-on-error: true
        with:
          args: "-fmt sarif -out gosec-results.sarif ./..."

      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        if: always() && hashFiles('gosec-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: gosec-results.sarif

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Run npm audit
        working-directory: ui
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  # ============================================================================
  # Quality
  # ============================================================================
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.c == 'true' || needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for sensitive files
        run: |
          SENSITIVE_FILES=$(find . -type f \( \
            -name "*.env" -o \
            -name "*.pem" -o \
            -name "*.key" -o \
            -name "*secret*" -o \
            -name "*credential*" \
          \) ! -path "./.git/*" ! -name "*.example" ! -name "*.sample" 2>/dev/null || true)
          if [ -n "$SENSITIVE_FILES" ]; then
            echo "Sensitive files found:"
            echo "$SENSITIVE_FILES"
            exit 1
          fi
          echo "No sensitive files found"

      - name: Check for TODO/FIXME in critical paths
        run: |
          if grep -rn "TODO\|FIXME" --include="*.go" internal/ cmd/ 2>/dev/null | head -20; then
            echo "Note: TODOs found in Go code (info only)"
          fi

      - name: Check for unsafe logging patterns
        run: |
          echo "Checking for dangerous logging patterns..."
          DANGEROUS_PATTERNS=(
            'log\.Print.*password'
            'log\.Print.*token'
            'log\.Print.*Authorization'
            'log\.Print.*apikey'
            'log\.Print.*secret'
            'fmt\.Printf.*password'
            'fmt\.Printf.*token'
          )
          VIOLATIONS=0
          for pattern in "${DANGEROUS_PATTERNS[@]}"; do
            if grep -rn -E "$pattern" --include="*.go" --exclude="*_test.go" internal/ cmd/ 2>/dev/null; then
              echo "❌ Found dangerous logging pattern: $pattern"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done
          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "ERROR: Found $VIOLATIONS unsafe logging pattern(s)"
            echo "Avoid logging sensitive data like passwords, tokens, or secrets"
            exit 1
          fi
          echo "✅ No unsafe logging patterns detected"

  # ============================================================================
  # Internationalization (i18n) Validation
  # ============================================================================
  i18n:
    name: i18n Validation
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for locale files
        id: check-locales
        run: |
          if [ -d "locales" ] || [ -d "ui/src/locales" ] || [ -d "ui/locales" ]; then
            echo "has_locales=true" >> $GITHUB_OUTPUT
            echo "Locale files found"
          else
            echo "has_locales=false" >> $GITHUB_OUTPUT
            echo "No locale files found, skipping i18n validation"
          fi

      - name: Validate translation key coverage
        if: steps.check-locales.outputs.has_locales == 'true'
        run: |
          echo "Checking translation key coverage..."

          # Find locale directory
          LOCALE_DIR=""
          for dir in "locales" "ui/src/locales" "ui/locales"; do
            if [ -d "$dir" ]; then
              LOCALE_DIR="$dir"
              break
            fi
          done

          if [ -z "$LOCALE_DIR" ]; then
            echo "No locale directory found"
            exit 0
          fi

          # Get base locale (English)
          if [ -d "$LOCALE_DIR/en" ]; then
            BASE_LOCALE="$LOCALE_DIR/en"
          elif [ -f "$LOCALE_DIR/en.json" ]; then
            BASE_LOCALE="$LOCALE_DIR/en.json"
          else
            echo "No English base locale found"
            exit 0
          fi

          echo "Base locale: $BASE_LOCALE"
          echo "Checking other locales for missing keys..."

          # This is a placeholder - actual implementation depends on locale structure
          echo "✅ i18n validation complete"

  # ============================================================================
  # Documentation Checks
  # ============================================================================
  # Markdown lint + link check. Mirrors seed's docs job (#56). Both substeps
  # are advisory (continue-on-error) — they surface issues without blocking
  # the build, matching seed's stance that doc quality is a ratcheting goal.
  docs:
    name: Documentation Quality
    runs-on: ubuntu-latest
    # Always runs — cheap (runs in seconds) and applies to every PR.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@5c5dfc0ac2e225883c0e5f03a85311ec2830d368 # v1
        continue-on-error: true
        with:
          use-quiet-mode: "yes"

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        continue-on-error: true
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !**/dist/**

  # ============================================================================
  # Build
  # ============================================================================
  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    needs: [changes, backend, frontend]
    runs-on: ${{ matrix.runner }}
    # always() lets the if: evaluate when backend was skipped upstream.
    # Note: matrix.required draft-skip was attempted here originally but
    # GitHub Actions rejects `matrix` in job-level if: (the matrix context
    # isn't bound until after the strategy expands). All matrix rows run
    # on every PR; per-arch arches are fast enough that the savings weren't
    # worth a workaround.
    if: |
      always() &&
      needs.frontend.result == 'success' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            required: true
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            required: false
          - os: darwin
            arch: amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            required: false
          - os: darwin
            arch: arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            required: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: internal/api/ui/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          go build -trimpath -buildvcs=false \
            -ldflags "-s -w \
              -X github.com/krisarmstrong/stem/internal/version.Version=${VERSION} \
              -X github.com/krisarmstrong/stem/internal/version.Commit=${COMMIT} \
              -X github.com/krisarmstrong/stem/internal/version.BuildTime=${BUILD_TIME}" \
            -o bin/stem-${{ matrix.os }}-${{ matrix.arch }} \
            ./cmd/stem/

      - name: Verify binary
        if: matrix.os == 'linux' && matrix.arch == 'amd64' || matrix.os == 'darwin'
        run: |
          ./bin/stem-${{ matrix.os }}-${{ matrix.arch }} version || true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stem-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/stem-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 7

  # ============================================================================
  # Lighthouse Performance Audit
  # ============================================================================
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend]
    timeout-minutes: 15
    # Skipped on draft PRs (slow); only runs when frontend changed.
    # always() lets the if: evaluate when backend was skipped upstream.
    if: |
      always() &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.frontend.result == 'success' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: internal/api/ui/

      - name: Build backend
        run: CGO_ENABLED=0 go build -o bin/stem ./cmd/stem/

      - name: Start server
        env:
          STEM_AUTH_USERNAME: admin
          STEM_AUTH_PASSWORD: admin
          STEM_TLS_ENABLED: "false"
        run: |
          nohup ./bin/stem web -p 8080 > server.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health/ready 2>/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          cat server.log
          exit 1

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          urls: |
            http://localhost:8080
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ============================================================================
  # E2E Browser Tests (Playwright)
  # ============================================================================
  e2e:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend]
    timeout-minutes: 30
    # Skipped on draft PRs (slow); also skipped if no frontend/backend changed.
    # always() lets the if: evaluate when backend was skipped upstream.
    if: |
      always() &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.frontend.result == 'success' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: internal/api/ui/

      - name: Install frontend dependencies (for Playwright)
        working-directory: ui
        run: npm ci

      - name: Build backend
        run: CGO_ENABLED=0 go build -o bin/stem ./cmd/stem/

      - name: Install Playwright browsers
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Start backend server
        env:
          STEM_AUTH_USERNAME: admin
          STEM_AUTH_PASSWORD: admin
          STEM_TLS_ENABLED: "false"
        run: |
          nohup ./bin/stem web -p 8080 > server.log 2>&1 &
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health/ready 2>/dev/null; then
              echo "Server ready after $i attempts"
              exit 0
            fi
            echo "Attempt $i: Server not ready, waiting..."
            sleep $((i < 5 ? 1 : 2))
          done
          echo "Server failed to start after 30 attempts"
          cat server.log
          exit 1

      - name: Run Playwright E2E tests
        working-directory: ui
        env:
          E2E_BASE_URL: http://localhost:8080
        run: npx playwright test e2e/smoke.spec.ts e2e/setup-wizard.spec.ts --project=chromium --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7

      - name: Upload server logs on failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: e2e-server-logs
          path: server.log

  # ============================================================================
  # CI Complete — dispatcher / branch-protection aggregator
  # ============================================================================
  # Every required-status-check on `main` is consolidated into this single
  # job. It fails if any upstream job actually failed; it passes if every
  # upstream either succeeded or was intentionally skipped via the path
  # filter. Branch protection should require ONLY "CI Complete" plus the
  # security-critical checks from other workflows (CodeQL, license-check) —
  # not every individual job — so docs-only PRs merge cleanly when
  # backend/frontend/c are all skipped.
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    # NOTE: e2e and lighthouse are deliberately excluded from this aggregator.
    # They were dropped from required-status-checks on main because they're
    # advisory (flaky / surface real issues that are tracked separately).
    # Including them here would re-block merge via the dispatcher on the
    # same flakes. They still run on every PR and surface their own status;
    # they just don't gate merge.
    needs:
      - changes
      - backend
      - race
      - frontend
      - c-lint
      - security
      - quality
      - i18n
      - docs
      - build
    if: always()
    steps:
      - name: Verify upstream results
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "Upstream job results:"
          echo "$RESULTS" | jq '.'
          if ! echo "$RESULTS" | jq -e 'to_entries | map(.value.result) | all(. == "success" or . == "skipped")' >/dev/null; then
            echo "::error::One or more required CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed (or were intentionally skipped)."
