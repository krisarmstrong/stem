# =============================================================================
# Docker Publish - Stem
# =============================================================================
# Builds and publishes multi-arch Docker images to GitHub Container Registry.
# Triggered on version tags (v*).
#
# NOTE: Full CI validation happens in ci.yml on every push to main.
# This workflow only verifies the build compiles before publishing.
# Tags should only be created after CI passes on main.
# =============================================================================

name: Docker Publish

on:
  push:
    tags:
      - "v*"

jobs:
  # ===========================================================================
  # Docker Build and Push
  # ===========================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
